<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Resume Upload</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold mt-4">Candidate Dashboard</h1>
    <p class="text-slate-400 mb-8">Upload your resume to generate a personalized interview.</p>

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
      <form id="resumeForm" class="space-y-4">
        <input type="file" name="resume" accept=".pdf" required class="block w-full text-sm text-slate-300" />
        <button class="bg-indigo-600 px-6 py-2 rounded-lg font-semibold">Upload Resume</button>
      </form>
      <div id="resumePreview" class="mt-6 hidden"></div>
    </div>
  </div>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
