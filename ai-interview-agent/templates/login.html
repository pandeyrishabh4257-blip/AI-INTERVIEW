<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Interview Agent - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900/70 border border-slate-800 rounded-2xl p-8 shadow-2xl">
      <h1 class="text-3xl font-bold mb-2">AI Avatar Interview</h1>
      <p class="text-slate-400 mb-6">Sign in to start your voice interview.</p>
      <form id="loginForm" class="space-y-4">
        <input type="email" name="email" placeholder="Email" required class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700" />
        <input type="password" name="password" placeholder="Password" required class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700" />
        <button class="w-full bg-indigo-600 hover:bg-indigo-500 transition py-3 rounded-lg font-semibold">Login</button>
      </form>
    </div>
  </div>
  <script src="/static/js/login.js"></script>
</body>
</html>
